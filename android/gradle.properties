org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Dfile.encoding=UTF-8
android.useAndroidX=true
# Fix: Kotlin cross-drive incremental cache failure (C:\ pub cache vs D:\ project on Windows)
kotlin.incremental=false
# Disable daemon to avoid OOM crash on limited-RAM systems
org.gradle.daemon=false
