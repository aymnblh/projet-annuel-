apiVersion: v1
kind: ConfigMap
metadata:
  name: oneclick-api-config
  namespace: oneclick
data:
  DATABASE_URL: "postgresql://oneclick_user:oneclick_pass@postgres:5432/oneclick_cars_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: oneclick-api-secret
  namespace: oneclick
type: Opaque
stringData:
  FIREBASE_SERVICE_ACCOUNT: '{}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oneclick-api
  namespace: oneclick
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oneclick-api
  template:
    metadata:
      labels:
        app: oneclick-api
    spec:
      containers:
        - name: oneclick-api
          image: ghcr.io/your-username/oneclick-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: oneclick-api-config
                  key: DATABASE_URL
            - name: FIREBASE_SERVICE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: oneclick-api-secret
                  key: FIREBASE_SERVICE_ACCOUNT
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: oneclick-api
  namespace: oneclick
spec:
  selector:
    app: oneclick-api
  ports:
    - port: 80
      targetPort: 8000
