version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: oneclick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oneclick_user
      POSTGRES_PASSWORD: oneclick_pass
      POSTGRES_DB: oneclick_cars_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: oneclick_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://oneclick_user:oneclick_pass@db:5432/oneclick_cars_db
      FIREBASE_SERVICE_ACCOUNT: /app/firebase_service_account.json
    volumes:
      - ./firebase_service_account.json:/app/firebase_service_account.json:ro
    ports:
      - "8000:8000"

volumes:
  postgres_data:
